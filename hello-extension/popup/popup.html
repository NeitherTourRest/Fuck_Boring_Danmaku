<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #e0e0e0;
      overflow-x: hidden;
    }

    .header {
      background: linear-gradient(135deg, #16213e, #0f3460);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2a2a4a;
    }
    .header-icon { font-size: 20px; }
    .header h1 { font-size: 14px; font-weight: 600; color: #fff; flex: 1; }
    .header-badge {
      font-size: 10px; color: #888; background: #0a0a1a;
      padding: 2px 8px; border-radius: 8px;
    }

    .toggles { padding: 10px 16px; }
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0;
    }
    .toggle-row + .toggle-row { border-top: 1px solid #25254a; }
    .toggle-info { flex: 1; }
    .toggle-label { font-size: 13px; font-weight: 500; }
    .toggle-desc { font-size: 10px; color: #666; margin-top: 1px; }
    .toggle-count { font-size: 11px; color: #e94560; font-weight: 600; min-width: 36px; text-align: right; }

    .switch { position: relative; width: 38px; height: 22px; flex-shrink: 0; }
    .switch input { display: none; }
    .slider {
      position: absolute; inset: 0; background: #444; border-radius: 22px;
      transition: background 0.2s; cursor: pointer;
    }
    .slider::before {
      content: ''; position: absolute;
      width: 16px; height: 16px; left: 3px; top: 3px;
      background: #fff; border-radius: 50%; transition: transform 0.2s;
    }
    .switch input:checked + .slider { background: #e94560; }
    .switch input:checked + .slider::before { transform: translateX(16px); }

    .ml-status { font-size: 9px; color: #555; margin-left: 4px; }
    .ml-status.ready { color: #16c79a; }
    .ml-status.loading { color: #f0a500; }

    .stats {
      display: flex; justify-content: space-around;
      padding: 10px 8px; background: #16213e; border-top: 1px solid #2a2a4a;
    }
    .stat-item { text-align: center; }
    .stat-value { font-size: 20px; font-weight: 700; color: #e94560; }
    .stat-value.dfa-color { color: #16c79a; }
    .stat-value.ml-color { color: #e94560; }
    .stat-label { font-size: 9px; color: #666; margin-top: 1px; }

    .keyword-section { padding: 6px 12px; }
    .section-title { font-size: 10px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin: 6px 0; }
    .keyword-list { max-height: 140px; overflow-y: auto; }
    .keyword-item {
      display: flex; align-items: center;
      padding: 4px 8px; margin: 1px 0;
      background: #16213e; border-radius: 3px;
    }
    .keyword-item:hover { background: #1f2f4f; }
    .keyword-text { flex: 1; font-size: 11px; word-break: break-all; }
    .delete-btn {
      background: none; border: none; color: #555;
      font-size: 12px; cursor: pointer; padding: 1px 5px; border-radius: 2px;
    }
    .delete-btn:hover { color: #e94560; background: rgba(233,69,96,0.15); }

    .add-section { display: flex; gap: 6px; padding: 6px 12px; }
    .add-input {
      flex: 1; padding: 5px 8px; font-size: 11px;
      background: #16213e; border: 1px solid #2a2a4a; border-radius: 3px;
      color: #e0e0e0; outline: none;
    }
    .add-input:focus { border-color: #e94560; }
    .add-btn {
      padding: 5px 12px; font-size: 11px;
      background: #e94560; color: #fff; border: none; border-radius: 3px;
      cursor: pointer; white-space: nowrap;
    }
    .add-btn:hover { background: #c73652; }

    .footer {
      display: flex; gap: 6px; padding: 6px 12px 12px;
      border-top: 1px solid #2a2a4a;
    }
    .footer-btn {
      flex: 1; padding: 5px 0; font-size: 10px;
      background: #16213e; color: #888; border: 1px solid #2a2a4a;
      border-radius: 3px; cursor: pointer;
    }
    .footer-btn:hover { background: #1f2f4f; color: #e0e0e0; }

    .empty-hint { text-align: center; color: #444; font-size: 10px; padding: 14px 0; }
    .keyword-list::-webkit-scrollbar { width: 3px; }
    .keyword-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* 拦截记录 */
    .log-item {
      display: flex; align-items: center;
      padding: 3px 6px; margin: 1px 0;
      background: #16213e; border-radius: 3px; font-size: 10px;
    }
    .log-text { flex: 1; word-break: break-all; color: #ccc; }
    .log-source {
      font-size: 8px; padding: 1px 5px; border-radius: 3px;
      margin: 0 4px; flex-shrink: 0;
    }
    .log-source.dfa { background: #16c79a22; color: #16c79a; }
    .log-source.ml { background: #e9456022; color: #e94560; }
    .log-btn {
      background: none; border: none; font-size: 10px;
      cursor: pointer; padding: 1px 4px; border-radius: 2px; flex-shrink: 0;
    }
    .log-btn:hover { background: rgba(255,255,255,0.1); }
    .log-btn.fp { color: #e94560; }
    .log-btn.ok { color: #16c79a; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">🛡️</span>
    <h1>弹幕过滤器</h1>
    <span class="header-badge">v0.2</span>
  </div>

  <div class="toggles">
    <div class="toggle-row">
      <div class="toggle-info">
        <div class="toggle-label">🔑 关键词过滤</div>
        <div class="toggle-desc">快速匹配预设关键词</div>
      </div>
      <span class="toggle-count" id="dfaCount">0</span>
      <label class="switch"><input type="checkbox" id="dfaToggle"><span class="slider"></span></label>
    </div>
    <div class="toggle-row">
      <div class="toggle-info">
        <div class="toggle-label">🧠 智能过滤 <span class="ml-status" id="mlStatus">检查中</span></div>
        <div class="toggle-desc">AI 语义理解过滤</div>
      </div>
      <span class="toggle-count" id="mlCount">0</span>
      <label class="switch"><input type="checkbox" id="mlToggle"><span class="slider"></span></label>
    </div>
  </div>

  <div class="stats">
    <div class="stat-item">
      <div class="stat-value dfa-color" id="dfaTotal">0</div>
      <div class="stat-label">关键词拦截</div>
    </div>
    <div class="stat-item">
      <div class="stat-value ml-color" id="mlTotal">0</div>
      <div class="stat-label">AI 拦截</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="totalCount">0</div>
      <div class="stat-label">总计</div>
    </div>
  </div>

  <div class="keyword-section">
    <div class="section-title" id="logSectionTitle" style="cursor:pointer;user-select:none;">📋 拦截记录 <span id="logToggle" style="color:#555;">▶</span></div>
    <div class="keyword-list" id="logList" style="display:none;max-height:200px;">
      <div class="empty-hint">暂无拦截记录<br><span style="font-size:9px;color:#444;">（在B站看视频时才会记录）</span></div>
    </div>
  </div>

  <div class="keyword-section" id="keywordSection">
    <div class="section-title">📋 关键词列表</div>
    <div class="keyword-list" id="keywordList">
      <div class="empty-hint">暂无关键词</div>
    </div>
  </div>

  <div class="add-section">
    <input type="text" class="add-input" id="addInput" placeholder="新关键词..." maxlength="20">
    <button class="add-btn" id="addBtn">添加</button>
  </div>

  <div class="footer">
    <button class="footer-btn" id="resetCountsBtn">清零计数</button>
    <button class="footer-btn" id="resetKeywordsBtn">恢复默认</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
